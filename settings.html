<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Daily Tracker - Settings</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/themes.css" />
</head>
<body class="theme-light app-body">
  <main class="app-shell mobile-shell">
    <header class="page-header glass-card">
      <div>
        <p class="eyebrow">Preferences</p>
        <h1>Settings and goals</h1>
      </div>
      <button id="themeToggle" class="icon-button" aria-label="Toggle dark mode">◐</button>
    </header>

    <section class="panel-card">
      <div class="section-head">
        <div>
          <p class="eyebrow">Profile</p>
          <h2>Current profile</h2>
        </div>
        <a href="index.html" class="text-link">Switch profile</a>
      </div>
      <div id="currentProfileCard" class="stack"></div>
    </section>

    <section class="panel-card">
      <div class="section-head">
        <div>
          <p class="eyebrow">Goals</p>
          <h2>Targets and reminders</h2>
        </div>
      </div>
      <form id="settingsForm" class="stack-lg">
        <div class="split-grid two-col">
          <div>
            <label for="startWeight">Start weight</label>
            <input id="startWeight" type="number" step="0.1" />
          </div>
          <div>
            <label for="goalWeight">Goal weight</label>
            <input id="goalWeight" type="number" step="0.1" />
          </div>
        </div>
        <div class="split-grid two-col">
          <div>
            <label for="calorieTarget">Daily calorie target</label>
            <input id="calorieTarget" type="number" step="1" />
          </div>
          <div>
            <label for="proteinTarget">Protein target (g)</label>
            <input id="proteinTarget" type="number" step="1" />
          </div>
        </div>
        <div class="split-grid two-col">
          <div>
            <label for="weighInDays">Remind after this many days</label>
            <input id="weighInDays" type="number" step="1" min="1" value="5" />
          </div>
          <div>
            <label for="displayName">Display name</label>
            <input id="displayName" type="text" />
          </div>
        </div>
        <button class="primary-button" type="submit">Save settings</button>
      </form>
    </section>

    <section class="panel-card">
      <div class="section-head">
        <div>
          <p class="eyebrow">Notifications</p>
          <h2>Browser reminders</h2>
        </div>
      </div>
      <button id="enableNotifications" class="secondary-button">Enable notifications</button>
      <p class="helper-text">These work best after adding the site to your home screen.</p>
    </section>

    <section class="panel-card">
      <div class="section-head">
        <div>
          <p class="eyebrow">Add another person</p>
          <h2>Create a new profile</h2>
        </div>
      </div>
      <form id="profileForm" class="stack-lg">
        <div class="split-grid two-col">
          <div>
            <label for="newProfileName">Profile name</label>
            <input id="newProfileName" type="text" maxlength="30" required />
          </div>
          <div>
            <label for="newProfilePin">4-digit PIN</label>
            <input id="newProfilePin" type="password" maxlength="4" minlength="4" required />
          </div>
        </div>
        <button class="primary-button" type="submit">Create profile</button>
      </form>
    </section>

    <nav class="bottom-nav glass-card">
      <a class="nav-link" href="dashboard.html">Home</a>
      <a class="nav-link" href="entry.html">Entry</a>
      <a class="nav-link" href="calendar.html">Calendar</a>
      <a class="nav-link" href="progress.html">Progress</a>
      <a class="nav-link active" href="settings.html">Settings</a>
    </nav>
  </main>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/settings.js"></script>
</body>
</html>
