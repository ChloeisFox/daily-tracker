<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f8f5fd" />
  <title>Daily Tracker - Recipes</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="./css/themes.css" />
</head>
<body class="theme-light">
  <main class="app-shell mobile-shell">
    <section class="page-header">
      <div>
        <p class="eyebrow">Daily Tracker</p>
        <h1>Recipes</h1>
        <p class="subtle">Save meals you use often and add them faster later.</p>
      </div>
      <button id="themeToggle" class="icon-button" aria-label="Toggle dark mode">◐</button>
    </section>

    <section class="panel-card stack-lg">
      <div class="section-head">
        <h2>Add Recipe</h2>
      </div>

      <form id="recipeForm" class="stack-lg">
        <input type="hidden" id="recipeId" />

        <div>
          <label for="recipeName">Recipe Name</label>
          <input id="recipeName" type="text" placeholder="Turkey taco bowl" required />
        </div>

        <div>
          <label for="recipeCategory">Category</label>
          <select id="recipeCategory">
            <option value="">Choose category</option>
            <option>Breakfast</option>
            <option>Lunch</option>
            <option>Dinner</option>
            <option>Snack</option>
            <option>Dessert</option>
            <option>Drink</option>
          </select>
        </div>

        <div>
          <label for="recipeServingSize">Serving Size</label>
          <input id="recipeServingSize" type="text" placeholder="1 bowl, 2 tacos, 1 cup" />
        </div>

        <div class="split-grid">
          <div>
            <label for="recipeCalories">Calories</label>
            <input id="recipeCalories" type="number" min="0" step="1" placeholder="450" />
          </div>
          <div>
            <label for="recipeProtein">Protein</label>
            <input id="recipeProtein" type="number" min="0" step="1" placeholder="35" />
          </div>
          <div>
            <label for="recipeCarbs">Carbs</label>
            <input id="recipeCarbs" type="number" min="0" step="1" placeholder="30" />
          </div>
          <div>
            <label for="recipeFat">Fat</label>
            <input id="recipeFat" type="number" min="0" step="1" placeholder="16" />
          </div>
        </div>

        <div>
          <label for="recipeIngredients">Ingredients</label>
          <textarea id="recipeIngredients" rows="4" placeholder="One ingredient per line"></textarea>
        </div>

        <div>
          <label for="recipeNotes">Notes</label>
          <textarea id="recipeNotes" rows="3" placeholder="Optional notes"></textarea>
        </div>

        
        <div class="inline-actions">
          <button class="primary-button" type="submit">Save Recipe</button>
          <button class="secondary-button" type="button" id="clearRecipeForm">Clear</button>
        </div>
      </form>
    </section>

    <section class="panel-card stack-lg">
      <div class="section-head">
        <h2>Your Recipes</h2>
      </div>

      <div>
        <label for="recipeSearch">Search</label>
        <input id="recipeSearch" type="text" placeholder="Search recipes" />
      </div>

      <div>
        <label for="recipeFilterCategory">Filter by category</label>
        <select id="recipeFilterCategory">
          <option value="">All categories</option>
          <option>Breakfast</option>
          <option>Lunch</option>
          <option>Dinner</option>
          <option>Snack</option>
          <option>Dessert</option>
          <option>Drink</option>
        </select>
      </div>

      <div id="recipeList" class="section-list"></div>
    </section>
  </main>

  <nav class="bottom-nav">
    <a class="nav-link" href="./dashboard.html">Home</a>
    <a class="nav-link" href="./entry.html">Entry</a>
    <a class="nav-link" href="./calendar.html">Calendar</a>
    <a class="nav-link" href="./progress.html">Progress</a>
    <a class="nav-link active" href="./recipes.html">Recipes</a>
    <a class="nav-link" href="./settings.html">Settings</a>
  </nav>

  <script type="module" src="./js/firebase-config.js"></script>
  <script type="module" src="./js/app.js"></script>
  <script type="module" src="./js/recipes.js"></script>
</body>
</html>
