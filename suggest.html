<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f1fb" />
  <title>Daily Tracker - Suggest</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/themes.css" />
</head>
<body class="theme-light app-body">
  <main class="app-shell mobile-shell">
    <header class="page-header glass-card">
      <div>
        <p class="eyebrow">Meal idea</p>
        <h1>Suggest a recipe</h1>
      </div>
      <button id="themeToggle" class="icon-button" aria-label="Toggle dark mode">◐</button>
    </header>

    <section class="panel-card stack-lg">
      <div class="section-head">
        <div>
          <p class="eyebrow">What do you have?</p>
          <h2>Enter ingredients</h2>
        </div>
      </div>

      <div class="stack-lg">
        <div>
          <label for="ingredientInput">Ingredients</label>
          <textarea
            id="ingredientInput"
            rows="5"
            placeholder="Type ingredients separated by commas or new lines&#10;Example: chicken, cheese, low carb tortilla, buffalo sauce"
          ></textarea>
        </div>

        <div>
          <label for="suggestCategory">Category</label>
          <select id="suggestCategory">
            <option value="">Any category</option>
            <option>Breakfast</option>
            <option>Lunch</option>
            <option>Dinner</option>
            <option>Snack</option>
            <option>Dessert</option>
            <option>Drink</option>
          </select>
        </div>

        <button id="suggestButton" class="primary-button" type="button">Suggest recipes</button>
      </div>
    </section>

    <section class="panel-card">
      <div class="section-head">
        <div>
          <p class="eyebrow">Matches</p>
          <h2>Best recipe ideas</h2>
        </div>
      </div>
      <div id="suggestResults" class="stack">
        <div class="empty-state">Add ingredients above to get recipe ideas.</div>
      </div>
    </section>

    <nav class="bottom-nav glass-card">
      <a class="nav-link" href="dashboard.html">Home</a>
      <a class="nav-link" href="entry.html">Entry</a>
      <a class="nav-link" href="calendar.html">Calendar</a>
      <a class="nav-link" href="progress.html">Progress</a>
      <a class="nav-link active" href="suggest.html">Suggest</a>
      <a class="nav-link" href="settings.html">Settings</a>
    </nav>
  </main>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/suggest.js"></script>
</body>
</html>
