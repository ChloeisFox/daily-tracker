<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f1fb" />
  <title>Daily Tracker - Suggest</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/themes.css" />
  <style>
    .chip-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .ingredient-chip {
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(255,255,255,0.8);
      border-radius: 999px;
      padding: 10px 14px;
      font: inherit;
      cursor: pointer;
    }

    .ingredient-chip.active {
      border-color: transparent;
      background: var(--accent, #d9c7ff);
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }
  </style>
</head>
<body class="theme-light app-body">
  <main class="app-shell mobile-shell">
    <header class="page-header glass-card">
      <div>
        <p class="eyebrow">Meal idea</p>
        <h1>Suggest a recipe</h1>
      </div>
      <div class="header-actions">
        <button id="themeToggle" class="icon-button" aria-label="Toggle dark mode">◐</button>
        <a class="icon-button" href="settings.html" aria-label="Settings">⚙</a>
      </div>
    </header>

    <section class="panel-card stack-lg">
      <div class="section-head">
        <div>
          <p class="eyebrow">Tap what you have</p>
          <h2>Choose ingredients</h2>
        </div>
      </div>

      <div>
        <label for="suggestCategory">Category</label>
        <select id="suggestCategory">
          <option value="">Any category</option>
          <option>Breakfast</option>
          <option>Lunch</option>
          <option>Dinner</option>
          <option>Snack</option>
          <option>Dessert</option>
          <option>Drink</option>
        </select>
      </div>

      <div class="inline-actions">
        <button id="clearIngredients" class="secondary-button" type="button">Clear selected</button>
        <button id="suggestButton" class="primary-button" type="button">Suggest recipes</button>
      </div>

      <div id="selectedIngredientsText" class="helper-text">No ingredients selected yet.</div>

      <div id="ingredientButtons" class="chip-grid"></div>
    </section>

    <section class="panel-card">
      <div class="section-head">
        <div>
          <p class="eyebrow">Matches</p>
          <h2>Best recipe ideas</h2>
        </div>
      </div>
      <div id="suggestResults" class="stack">
        <div class="empty-state">Tap ingredients above to get recipe ideas.</div>
      </div>
    </section>

    <nav class="bottom-nav glass-card">
      <a class="nav-link" href="dashboard.html">Home</a>
      <a class="nav-link" href="entry.html">Entry</a>
      <a class="nav-link" href="calendar.html">Calendar</a>
      <a class="nav-link" href="progress.html">Progress</a>
      <a class="nav-link active" href="suggest.html">Suggest</a>
    </nav>
  </main>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/suggest.js"></script>
</body>
</html>
