<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Daily Tracker - Progress</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/themes.css" />
</head>
<body class="theme-light app-body">
  <main class="app-shell mobile-shell">
    <header class="page-header glass-card">
      <div>
        <p class="eyebrow">Big picture</p>
        <h1>Progress and trends</h1>
      </div>
      <button id="themeToggle" class="icon-button" aria-label="Toggle dark mode">◐</button>
    </header>

    <section class="card-grid two-up">
      <article class="panel-card pastel-green"><span class="eyebrow">Current weight</span><h2 id="progressCurrentWeight">--</h2></article>
      <article class="panel-card pastel-pink"><span class="eyebrow">Pounds lost</span><h2 id="progressPoundsLost">--</h2></article>
      <article class="panel-card pastel-blue"><span class="eyebrow">Average daily calories</span><h2 id="progressAvgCalories">--</h2></article>
      <article class="panel-card pastel-yellow"><span class="eyebrow">Days tracked</span><h2 id="progressDaysTracked">0</h2></article>
    </section>

    <section class="panel-card">
      <div class="section-head">
        <div>
          <p class="eyebrow">Weights</p>
          <h2>Recent weight history</h2>
        </div>
      </div>
      <div id="weightTrend" class="stack"></div>
    </section>

    <section class="panel-card">
      <div class="section-head">
        <div>
          <p class="eyebrow">Activity</p>
          <h2>Workout totals</h2>
        </div>
      </div>
      <div id="workoutTrend" class="stack"></div>
    </section>

    <section class="panel-card">
      <div class="section-head">
        <div>
          <p class="eyebrow">Nutrition</p>
          <h2>Meal averages</h2>
        </div>
      </div>
      <div id="nutritionSummary" class="stack"></div>
    </section>

<nav class="bottom-nav glass-card">
  <a class="nav-link active" href="dashboard.html">Home</a>
  <a class="nav-link" href="entry.html">Entry</a>
  <a class="nav-link" href="calendar.html">Calendar</a>
  <a class="nav-link" href="progress.html">Progress</a>
  <a class="nav-link" href="suggest.html">Suggest</a>
  <a class="nav-link" href="settings.html">Settings</a>
</nav>
  </main>

  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/progress.js"></script>
</body>
</html>
